<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pengumuman Kelulusan SD NEGERI 082/VII SUNGAI BENTENG II</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#0f4c81,#1e88e5);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:800px;
    background:white;
    border-radius:20px;
    padding:35px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.logo{
    width:120px;
    margin-bottom:15px;
}

h1{
    color:#0f4c81;
    margin-bottom:20px;
    line-height:1.5;
}

.timer{
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
    margin-top:20px;
}

.box{
    background:#1e88e5;
    color:white;
    padding:15px;
    border-radius:15px;
    min-width:90px;
}

.box span{
    display:block;
    font-size:30px;
    font-weight:bold;
}

.box small{
    font-size:14px;
}

#formSection{
    display:none;
    margin-top:20px;
}

input{
    width:100%;
    padding:12px;
    border:2px solid #1e88e5;
    border-radius:10px;
    margin-top:10px;
    margin-bottom:15px;
    font-size:16px;
}

button{
    background:#1e88e5;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#1565c0;
}

.result{
    margin-top:25px;
    padding:20px;
    border-radius:12px;
    display:none;
}

.lulus{
    background:#e8f5e9;
    border:2px solid #4caf50;
}

.tidak{
    background:#ffebee;
    border:2px solid #f44336;
}

.note{
    margin-top:20px;
    background:#fff8e1;
    padding:15px;
    border-radius:10px;
    text-align:left;
}

footer{
    margin-top:25px;
    color:#666;
    font-size:14px;
}

@media(max-width:600px){
    h1{
        font-size:22px;
    }
}
</style>
</head>

<body>

<div class="container">

<img src="https://iili.io/CF3uIta.png" class="logo">

<h1>
Pengumuman Kelulusan<br>
SD NEGERI 082/VII SUNGAI BENTENG II<br>
Tahun Ajaran 2025/2026
</h1>

<div id="countdownSection">

<h2 style="color:#0f4c81">Pengumuman Akan Dibuka Dalam:</h2>

<div class="timer">
<div class="box"><span id="days">0</span><small>Hari</small></div>
<div class="box"><span id="hours">0</span><small>Jam</small></div>
<div class="box"><span id="minutes">0</span><small>Menit</small></div>
<div class="box"><span id="seconds">0</span><small>Detik</small></div>
</div>

</div>

<div id="formSection">

<h3>Masukkan NISN Anda:</h3>

<input type="text" id="nisn" placeholder="Masukkan NISN">

<button onclick="cekKelulusan()">Lihat Hasil Kelulusan</button>

<div id="hasil" class="result"></div>

</div>

<footer>
© 2026 SD NEGERI 082/VII SUNGAI BENTENG II
</footer>

</div>

function cekKelulusan(){
const nisn=document.getElementById('nisn').value.trim();
const hasil=document.getElementById('hasil');

if(siswa[nisn]){
hasil.style.display='block';
hasil.className='result lulus';

hasil.innerHTML=`
<h2>🎉 SELAMAT!</h2>
<br>
<p><b>Nama:</b> ${siswa[nisn].nama}</p>
<p><b>NISN:</b> ${nisn}</p>
<p><b>Keterangan:</b> ${siswa[nisn].status}</p>

<div class="note">
<b>📄 Catatan Penting:</b><br><br>
Peserta didik yang dinyatakan lulus silahkan datang ke sekolah pada Hari Sabtu, 06 Juni 2026.<br>
Harap menggunakan pakaian sekolah yang rapi dan sopan.
</div>
`;
}else{
hasil.style.display='block';
hasil.className='result tidak';
hasil.innerHTML='Data tidak ditemukan. Periksa kembali NISN Anda.';
}
}

const target = new Date("June 2, 2026 20:00:00 GMT+0700").getTime();

const interval = setInterval(function(){

const now = new Date().getTime();
const distance = target - now;

if(distance <= 0){

clearInterval(interval);

document.getElementById("countdownSection").style.display="none";
document.getElementById("formSection").style.display="block";

return;
}

document.getElementById("days").innerText =
Math.floor(distance/(1000*60*60*24));

document.getElementById("hours").innerText =
Math.floor((distance%(1000*60*60*24))/(1000*60*60));

document.getElementById("minutes").innerText =
Math.floor((distance%(1000*60*60))/(1000*60));

document.getElementById("seconds").innerText =
Math.floor((distance%(1000*60))/1000);

},1000);

</script>

</html>
